name: 03 - Runners de workflow
on:
  push:

jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar SO
        run: |
          echo "Este trabajo se ejecuta en un runner de Ubuntu"
          echo "Nombre del sistema operativo: $RUNNER_OS"
  windows-echo:
    runs-on: windows-latest
    steps:
      - name: Mostrar SO
        run: |
          echo "Este trabajo se ejecuta en un runner de Windows"
          echo "Nombre del sistema operativo: $RUNNER_OS"
  macos-echo:
    runs-on: macos-latest
    steps:
      - name: Mostrar SO
        run: |
          echo "Este trabajo se ejecuta en un runner de macOS"
          echo "Nombre del sistema operativo: $RUNNER_OS"
